server.name: kibana
server.host: 0.0.0.0
elasticsearch.hosts: [ https://elasticsearch:9200 ]

monitoring.ui.container.elasticsearch.enabled: true
monitoring.ui.container.logstash.enabled: true

elasticsearch.username: kibana_system
elasticsearch.password: ${KIBANA_SYSTEM_PASSWORD}

# TLS: Kibana ↔ Elasticsearch
elasticsearch.ssl.certificateAuthorities: [ config/ca.crt ]

# TLS: browser ↔ Kibana
server.ssl.enabled: true
server.ssl.certificate: config/kibana.crt
server.ssl.key: config/kibana.key

# Encryption keys — generated automatically by kibana-init on first run.
# To regenerate: remove the three lines below, run `docker compose run --rm kibana-init`, restart kibana.
xpack.security.encryptionKey: b7c5438c85c07f276ecd8f736f480594
xpack.encryptedSavedObjects.encryptionKey: 0d70fd9265fd41790380a561e6797538
xpack.reporting.encryptionKey: 40406e214e849db396b6d875cf051191

telemetry.optIn: false

# Fleet
xpack.fleet.isAirGapped: true
xpack.fleet.registryUrl: "http://package-registry:8080"

xpack.fleet.agents.fleet_server.hosts: [ https://fleet-server:8220 ]

xpack.fleet.outputs:
  - id: fleet-default-output
    name: default
    type: elasticsearch
    hosts: [ https://elasticsearch:9200 ]
    #ca_trusted_fingerprint: <injected-by-kibana-init>
    is_default: true
    is_default_monitoring: true

xpack.fleet.packages:
  - name: fleet_server
    version: latest
  - name: system
    version: latest
  - name: elastic_agent
    version: latest
  - name: docker
    version: latest

xpack.fleet.agentPolicies:
  - name: Fleet Server Policy
    id: fleet-server-policy
    description: Static agent policy for Fleet Server
    monitoring_enabled:
      - logs
      - metrics
    package_policies:
      - name: fleet_server-1
        package:
          name: fleet_server
      - name: system-1
        package:
          name: system
      - name: elastic_agent-1
        package:
          name: elastic_agent
      - name: docker-1
        package:
          name: docker
