# X.509 certificate instances for elasticsearch-certutil.
#
# If FLEET_EXTERNAL_HOST is set in .env, the tls entrypoint automatically adds
# that IP/hostname to the elasticsearch and fleet-server certificates.
#
# Ref. https://www.elastic.co/guide/en/elasticsearch/reference/current/certutil.html#certutil-silent
instances:

- name: elasticsearch
  dns:
  - elasticsearch
  - localhost
  ip:
  - 127.0.0.1
  - ::1

- name: kibana
  dns:
  - kibana
  - localhost
  ip:
  - 127.0.0.1
  - ::1

- name: fleet-server
  dns:
  - fleet-server
  - localhost
  ip:
  - 127.0.0.1
  - ::1

- name: logstash
  dns:
  - logstash
  - localhost
  ip:
  - 127.0.0.1
  - ::1
