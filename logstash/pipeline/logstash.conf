input {
	beats {
		port => 5044
	}

	tcp {
		port => 50000
		codec => json_lines
	}
}

output {
	elasticsearch {
		hosts => "https://elasticsearch:9200"
		user => "logstash_internal"
		password => "${LOGSTASH_INTERNAL_PASSWORD}"
		ssl_enabled => true
		ssl_certificate_authorities => "config/ca.crt"
	}
}
