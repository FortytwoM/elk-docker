# X.509 certificate instances for elasticsearch-certutil.
#
# To connect external Elastic Agents, add your Docker host's IP/FQDN
# to the 'elasticsearch' and 'fleet-server' entries, then regenerate certs:
#   make certs && docker compose up -d
#
# Ref. https://www.elastic.co/guide/en/elasticsearch/reference/current/certutil.html#certutil-silent
instances:

- name: elasticsearch
  dns:
  - elasticsearch
  - localhost
  # Add Docker host FQDN for external agent access:
  #- elk.example.com
  ip:
  - 127.0.0.1
  - ::1
  # Add Docker host IP for external agent access:
  #- 192.168.1.100

- name: kibana
  dns:
  - kibana
  - localhost
  ip:
  - 127.0.0.1
  - ::1

- name: fleet-server
  dns:
  - fleet-server
  - localhost
  # Add Docker host FQDN for external agent access:
  #- elk.example.com
  ip:
  - 127.0.0.1
  - ::1
  # Add Docker host IP for external agent access:
  #- 192.168.1.100

- name: logstash
  dns:
  - logstash
  - localhost
  ip:
  - 127.0.0.1
  - ::1

- name: apm-server
  dns:
  - apm-server
  - localhost
  ip:
  - 127.0.0.1
  - ::1
